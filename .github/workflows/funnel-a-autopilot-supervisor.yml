name: Funnel A Autopilot Supervisor

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  supervise:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce autonomous Funnel A progress loop
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const label = "funnel-a-active";
            const marker = "[AUTOPILOT:FUNNEL_A]";
            const staleMinutes = 45;
            const cooldownMinutes = 90;
            const noActiveCooldownMinutes = 20;
            const logOnlyGraceMinutes = 10;
            const approvalAdvanceMinutes = 30;

            const nowMs = Date.now();

            function toMs(input) {
              const ms = Date.parse(input || "");
              return Number.isFinite(ms) ? ms : 0;
            }

            function minutesSince(ms) {
              if (!ms) return Number.MAX_SAFE_INTEGER;
              return Math.floor((nowMs - ms) / 60000);
            }

            function findLatestVerdict(events) {
              const verdicts = events
                .filter((e) => e.body && e.body.includes("merge verdict:"))
                .map((e) => ({ body: e.body, ts: toMs(e.created_at || e.submitted_at) }))
                .sort((a, b) => b.ts - a.ts);
              return verdicts[0] || null;
            }

            function hasRecentSupervisorComment(comments, tag, withinMinutes = cooldownMinutes) {
              return comments.some((c) => {
                if (!c.body || !c.body.includes(marker) || !c.body.includes(tag)) return false;
                return minutesSince(toMs(c.created_at)) < withinMinutes;
              });
            }

            const prs = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: "open",
              per_page: 100
            });

            const active = prs.filter((pr) =>
              (pr.labels || []).some((l) => l.name === label)
            );

            if (active.length === 0) {
              const openCandidates = prs
                .filter((p) => !p.draft && (p.base?.ref || "") === "main")
                .sort((a, b) => toMs(b.updated_at) - toMs(a.updated_at));
              let firstRetiredOpenPr = null;

              for (const candidate of openCandidates) {
                const candidateComments = await github.paginate(github.rest.issues.listComments, {
                  owner,
                  repo,
                  issue_number: candidate.number,
                  per_page: 100
                });
                const retired = candidateComments.some((c) =>
                  (c.body || "").includes(`${marker}[RETIRED_PR]`)
                );
                if (retired) {
                  if (!firstRetiredOpenPr) {
                    firstRetiredOpenPr = candidate;
                  }
                  core.info(`Skipping retired PR #${candidate.number} for active assignment.`);
                  continue;
                }

                const files = await github.paginate(github.rest.pulls.listFiles, {
                  owner,
                  repo,
                  pull_number: candidate.number,
                  per_page: 100
                });
                const names = files.map((f) => f.filename || "");
                const likelyFunnel = names.some((f) =>
                  /^src\/app\/api\/(worksheets|feedback|notes|classes|students|assessments|reports\/monthly)/.test(f) ||
                  f.startsWith("src/app/dashboard/quickstart") ||
                  f.startsWith("src/lib/auth/") ||
                  f.startsWith("prisma/")
                );
                if (!likelyFunnel) {
                  continue;
                }

                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: candidate.number,
                  labels: [label]
                });
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: candidate.number,
                  body: `${marker}[AUTO_ACTIVE_ASSIGN]

                  Assigned this PR as the active Funnel A PR (label: ${label}).
                  Continue autonomous loop now:
                  implement -> push -> /funnel-a gate -> patch until APPROVE.`
                });
                core.info(`Auto-assigned PR #${candidate.number} as active Funnel A PR.`);
                return;
              }

              const closedPrs = await github.paginate(github.rest.pulls.list, {
                owner,
                repo,
                state: "closed",
                per_page: 100
              });
              const latestFunnelPr = closedPrs
                .filter((p) => (p.labels || []).some((l) => l.name === label))
                .sort((a, b) => toMs(b.updated_at) - toMs(a.updated_at))[0] || firstRetiredOpenPr;

              if (!latestFunnelPr) {
                core.info("No open funnel-a-active PR and no prior labeled closed PR found.");
                return;
              }

              const recentComments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: latestFunnelPr.number,
                per_page: 100
              });
              const recentNoActivePing = recentComments.some((c) => {
                if (!c.body || !c.body.includes(`${marker}[NO_ACTIVE_PR]`)) return false;
                return minutesSince(toMs(c.created_at)) < noActiveCooldownMinutes;
              });
              if (recentNoActivePing) {
                core.info(`No-active reminder already posted recently on PR #${latestFunnelPr.number}.`);
                return;
              }

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: latestFunnelPr.number,
                body: `${marker}[NO_ACTIVE_PR]

                No open PR labeled funnel-a-active is currently present.

                Execute now:
                1. Open next Funnel A PR and apply label: funnel-a-active.
                2. Post Part plan with scope and checks.
                3. Push first production-code commit (src/ or prisma/).

                @codex address that feedback`
              });
              core.info(`Posted no-active-pr escalation on PR #${latestFunnelPr.number}.`);
              return;
            }

            // Single active PR is expected. If there are multiple, supervise the most recently updated.
            active.sort((a, b) => toMs(b.updated_at) - toMs(a.updated_at));
            const pr = active[0];
            const hasAnotherActivePr = active.some((p) => p.number !== pr.number);

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: pr.number,
              per_page: 100
            });

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100
            });

            const commits = await github.paginate(github.rest.pulls.listCommits, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100
            });

            const latestCommit = commits
              .map((c) => ({
                sha: c.sha,
                ts: toMs(c.commit?.committer?.date || c.commit?.author?.date)
              }))
              .sort((a, b) => b.ts - a.ts)[0] || null;

            const latestCommitMs = latestCommit ? latestCommit.ts : 0;
            const latestCommitSha = latestCommit ? latestCommit.sha : "";

            let latestCommitFiles = [];
            if (latestCommitSha) {
              const commitDetail = await github.rest.repos.getCommit({
                owner,
                repo,
                ref: latestCommitSha
              });
              latestCommitFiles = (commitDetail.data.files || []).map((f) => f.filename);
            }

            const controlFiles = new Set([
              "PROGRESS_LOG.md",
              "HEARTBEAT.md",
              "POSTMORTEM.md"
            ]);
            const latestCommitIsLogOnly =
              latestCommitFiles.length > 0 &&
              latestCommitFiles.every((f) => controlFiles.has(f));

            const commitShas = new Set(commits.map((c) => (c.sha || "").toLowerCase()));
            const connectorComments = comments
              .filter((c) => (c.user?.login || "").includes("chatgpt-codex-connector"))
              .sort((a, b) => toMs(b.created_at) - toMs(a.created_at));
            const latestConnectorClaim = connectorComments.find((c) =>
              /Committed the patch on the current branch as\s+`([0-9a-f]{7,40})`/i.test(c.body || "")
            );

            if (latestConnectorClaim && !hasRecentSupervisorComment(comments, "[CLAIM_MISMATCH]", 90)) {
              const claimMatch = (latestConnectorClaim.body || "").match(/Committed the patch on the current branch as\s+`([0-9a-f]{7,40})`/i);
              const claimedShaRaw = claimMatch ? claimMatch[1] : "";
              const claimedSha = claimedShaRaw.toLowerCase();
              const presentInPrCommits = Array.from(commitShas).some((sha) => sha.startsWith(claimedSha));

              let presentInRepo = false;
              if (!presentInPrCommits && claimedSha) {
                try {
                  await github.rest.repos.getCommit({ owner, repo, ref: claimedShaRaw });
                  presentInRepo = true;
                } catch (e) {
                  presentInRepo = false;
                }
              }

              if (!presentInPrCommits && !presentInRepo) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: pr.number,
                  body: `${marker}[CLAIM_MISMATCH]

                  Connector status claimed commit \`${claimedShaRaw}\`, but that SHA is not present in this PR or repository.

                  Required now:
                  1. Stop status claims without verifiable SHA.
                  2. Push a real production-code commit (src/ or prisma/).
                  3. Trigger gate rerun and post evidence with existing SHA.

                  @codex address that feedback
                  /funnel-a gate`
                });
                core.info(`Posted claim-mismatch enforcement on PR #${pr.number}.`);
                return;
              }
            }

            const mergedEvents = [
              ...comments.map((c) => ({ body: c.body || "", created_at: c.created_at })),
              ...reviews.map((r) => ({ body: r.body || "", submitted_at: r.submitted_at || r.created_at }))
            ];
            const latestVerdict = findLatestVerdict(mergedEvents);
            const latestVerdictMs = latestVerdict ? latestVerdict.ts : 0;
            const latestVerdictBody = latestVerdict ? latestVerdict.body : "";

            const latestSupervisorMs = comments
              .filter((c) => c.body && c.body.includes(marker))
              .map((c) => toMs(c.created_at))
              .sort((a, b) => b - a)[0] || 0;
            core.info(`Minutes since any supervisor comment: ${minutesSince(latestSupervisorMs)}.`);

            if (!latestVerdictBody) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr.number,
                body: `${marker}

                No gate verdict found yet for this active Funnel A PR.

                Required now:
                1. Push current code state if not pushed.
                2. Trigger gate: /funnel-a gate
                3. If blocked, run immediate patch loop until APPROVE.

                /funnel-a gate`
              });
              core.info(`Posted missing-verdict supervisor command on PR #${pr.number}.`);
              return;
            }

            if (latestVerdictBody.includes("merge verdict: APPROVE")) {
              const approvalAge = minutesSince(latestVerdictMs);
              const prDetails = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: pr.number
              });
              const mergeable = prDetails.data.mergeable;
              const mergeState = (prDetails.data.mergeable_state || "").toLowerCase();
              const isDraft = Boolean(prDetails.data.draft);
              const isOpen = (prDetails.data.state || "").toLowerCase() === "open";

              if (
                isOpen &&
                !isDraft &&
                mergeable === true &&
                !["dirty", "blocked", "behind", "unknown"].includes(mergeState)
              ) {
                try {
                  await github.rest.pulls.merge({
                    owner,
                    repo,
                    pull_number: pr.number,
                    merge_method: "squash"
                  });
                  await github.rest.issues.createComment({
                    owner,
                    repo,
                    issue_number: pr.number,
                    body: `${marker}[AUTO_MERGED]

                    Approved Funnel A PR was merged automatically.
                    Next required action: open the next production-code PR and apply label ${label}.`
                  });
                  core.info(`Auto-merged approved PR #${pr.number}.`);
                } catch (e) {
                  if (!hasRecentSupervisorComment(comments, "[AUTO_MERGE_FAILED]", 90)) {
                    await github.rest.issues.createComment({
                      owner,
                      repo,
                      issue_number: pr.number,
                      body: `${marker}[AUTO_MERGE_FAILED]

                      PR is approved but auto-merge failed.
                      Error: ${(e && e.message) ? e.message : "unknown"}.

                      Execute now:
                      1. Resolve merge blockers.
                      2. Push update.
                      3. /funnel-a gate`
                    });
                  }
                  core.info(`Auto-merge failed for PR #${pr.number}.`);
                }
                return;
              }

              if (
                isOpen &&
                !hasAnotherActivePr &&
                approvalAge >= 5 &&
                (mergeable !== true || ["dirty", "behind", "blocked", "unknown"].includes(mergeState)) &&
                !hasRecentSupervisorComment(comments, "[RETIRED_PR]", 120)
              ) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: pr.number,
                  body: `${marker}[RETIRED_PR]

                  PR is approved but not mergeable yet (mergeable=${mergeable}, state=${mergeState || "unknown"}, approvalAge=${approvalAge}m).
                  This PR is retired from active queue to unblock forward progress.

                  Required now:
                  1. Open replacement Funnel A PR from up-to-date main.
                  2. Apply label ${label}.
                  3. Cherry-pick or reapply required production commits.
                  4. Run /funnel-a gate.

                  @codex address that feedback`
                });
                try {
                  await github.rest.issues.removeLabel({
                    owner,
                    repo,
                    issue_number: pr.number,
                    name: label
                  });
                  core.info(`Removed ${label} from retired PR #${pr.number}.`);
                } catch (e) {
                  core.info(`Label removal skipped for PR #${pr.number}: ${(e && e.message) ? e.message : "unknown"}`);
                }
                return;
              }

              const nextTaskSinceVerdict = comments.some((c) => {
                if (!c.body || !c.body.includes("[ARBY:NEXT_TASK]")) return false;
                return toMs(c.created_at) >= latestVerdictMs;
              });

              if (
                !nextTaskSinceVerdict &&
                !hasRecentSupervisorComment(comments, "[NEXT_TASK_REMINDER]", 60)
              ) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: pr.number,
                  body: `${marker}[NEXT_TASK_REMINDER]

                  Latest verdict is APPROVE.
                  Move immediately to next Funnel A task and open the next PR now.
                  Post Part N+1 plan and start the implementation loop.

                  @codex address that feedback`
                });
                core.info(`Posted next-task reminder on PR #${pr.number}.`);
              } else {
                core.info(`PR #${pr.number} already approved with next-task handoff.`);
              }

              if (
                approvalAge >= approvalAdvanceMinutes &&
                !hasAnotherActivePr &&
                !hasRecentSupervisorComment(comments, "[NEXT_PR_REQUIRED]")
              ) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: pr.number,
                  body: `${marker}[NEXT_PR_REQUIRED]

                  PR is approved but no next active Funnel A PR is visible after ${approvalAge} minutes.

                  Execute now:
                  1. Open next PR labeled funnel-a-active.
                  2. Post Part N+1 plan.
                  3. Push first production-code commit (src/ or prisma/).

                  @codex address that feedback`
                });
                core.info(`Posted next-pr-required enforcement on PR #${pr.number}.`);
              }
              return;
            }

            if (
              latestCommitIsLogOnly &&
              minutesSince(latestCommitMs) >= logOnlyGraceMinutes &&
              !hasRecentSupervisorComment(comments, "[LOG_ONLY_BREACH]", 45)
            ) {
              const shortSha = latestCommitSha ? latestCommitSha.slice(0, 7) : "unknown";
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr.number,
                body: `${marker}[LOG_ONLY_BREACH]

                Latest commit (${shortSha}) touched only control-loop files and did not patch production code.

                Required now:
                1. Patch blocker in production files (src/ or prisma/).
                2. Push commit.
                3. Rerun gate.

                @codex address that feedback
                /funnel-a gate`
              });
              core.info(`Posted log-only-breach enforcement on PR #${pr.number}.`);
              return;
            }

            const lastProgressMs = Math.max(latestCommitMs, latestVerdictMs);
            const staleAge = minutesSince(lastProgressMs);
            if (staleAge < staleMinutes) {
              core.info(`PR #${pr.number} within active patch window (${staleAge}m).`);
              return;
            }

            if (hasRecentSupervisorComment(comments, "[STALE_BLOCKED]", cooldownMinutes)) {
              core.info(`PR #${pr.number}: stale-blocked command already posted recently.`);
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pr.number,
              body: `${marker}[STALE_BLOCKED]

              Latest verdict is REQUEST_CHANGES and no commit landed for ${staleAge} minutes.

              Execute now:
              1. @codex address that feedback
              2. Push blocker fix commit
              3. /funnel-a gate
              4. Post WhatsApp evidence update (part, commit, files changed, gate run url, merge verdict, blockers, next action (next 60 min))

              @codex address that feedback
              /funnel-a gate`
            });
            core.info(`Posted stale-request-changes supervisor command on PR #${pr.number}.`);
