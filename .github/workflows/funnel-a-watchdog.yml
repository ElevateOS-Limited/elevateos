name: Funnel A Watchdog

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  watchdog:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce Funnel A cadence on labeled PRs
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const staleMinutes = 60;
            const escalateMinutes = 120;
            const label = "funnel-a-active";
            const marker = "[WATCHDOG:FUNNEL_A]";
            const statusTokens = [
              "part",
              "commit",
              "files changed",
              "gate run url",
              "merge verdict",
              "blockers",
              "next action (next 60 min)"
            ];

            function isStructuredStatusComment(body = "") {
              const normalized = body.toLowerCase();
              return statusTokens.every((token) => normalized.includes(token));
            }

            const prs = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: "open",
              per_page: 100
            });

            const targetPrs = prs.filter((pr) =>
              (pr.labels || []).some((l) => l.name === label)
            );

            core.info(`Open PRs: ${prs.length}, labeled '${label}': ${targetPrs.length}`);
            if (targetPrs.length === 0) {
              core.info("No active Funnel A PR found. Nothing to enforce.");
              return;
            }

            const now = new Date();
            for (const pr of targetPrs) {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: pr.number,
                per_page: 100
              });

              const commits = await github.paginate(github.rest.pulls.listCommits, {
                owner,
                repo,
                pull_number: pr.number,
                per_page: 100
              });

              const reviews = await github.paginate(github.rest.pulls.listReviews, {
                owner,
                repo,
                pull_number: pr.number,
                per_page: 100
              });

              const verdictSignals = [];
              for (const c of comments) {
                if (c.body && c.body.includes("merge verdict:")) {
                  verdictSignals.push({ body: c.body, ts: Date.parse(c.created_at) || 0 });
                }
              }
              for (const r of reviews) {
                if (r.body && r.body.includes("merge verdict:")) {
                  verdictSignals.push({ body: r.body, ts: Date.parse(r.submitted_at || r.created_at) || 0 });
                }
              }
              if (verdictSignals.length > 0) {
                verdictSignals.sort((a, b) => b.ts - a.ts);
                const latestVerdict = verdictSignals[0].body;
                if (latestVerdict.includes("merge verdict: APPROVE")) {
                  core.info(`PR #${pr.number} already approved. Skipping cadence enforcement.`);
                  continue;
                }
              }

              const latestStructuredStatusMs = comments
                .filter((c) =>
                  c.body &&
                  !c.body.includes(marker) &&
                  c.user?.type !== "Bot" &&
                  isStructuredStatusComment(c.body)
                )
                .map((c) => Date.parse(c.created_at))
                .filter((t) => Number.isFinite(t))
                .sort((a, b) => b - a)[0] || 0;

              const latestCommitMs = commits
                .map((c) => Date.parse(c.commit?.committer?.date || c.commit?.author?.date || ""))
                .filter((t) => Number.isFinite(t))
                .sort((a, b) => b - a)[0] || 0;

              const fallbackPrUpdateMs = Date.parse(pr.updated_at) || 0;

              let lastActivityMs = fallbackPrUpdateMs;
              let lastActivityType = "PR update metadata";
              if (latestCommitMs >= latestStructuredStatusMs && latestCommitMs > 0) {
                lastActivityMs = latestCommitMs;
                lastActivityType = "commit";
              } else if (latestStructuredStatusMs > 0) {
                lastActivityMs = latestStructuredStatusMs;
                lastActivityType = "structured status comment";
              }

              const ageMs = now - new Date(lastActivityMs);
              const ageMin = Math.floor(ageMs / 60000);

              if (ageMin < staleMinutes) {
                core.info(`PR #${pr.number} within cadence (${ageMin}m).`);
                continue;
              }

              const recentWatchdogComment = comments.find((c) => {
                if (!c.body || !c.body.includes(marker)) return false;
                const created = new Date(c.created_at);
                const minutesAgo = Math.floor((now - created) / 60000);
                return minutesAgo < 55;
              });

              if (recentWatchdogComment) {
                core.info(`PR #${pr.number}: watchdog comment already posted recently.`);
                continue;
              }

              const escalation = ageMin >= escalateMinutes;
              const severityLine = escalation
                ? "Status: ESCALATION REQUIRED"
                : "Status: CADENCE BREACH";

              const body = `${marker}

              ${severityLine}

              PR #${pr.number} has no update for ${ageMin} minutes.
              Last counted activity: ${lastActivityType} at ${new Date(lastActivityMs).toISOString()}.

              Required now:
              1. Push a commit or post structured status update within 30 minutes.
              2. Include: part, commit, files changed, gate run url, merge verdict, blockers, next action (next 60 min).
              3. If gate is BLOCKED, patch immediately and rerun until PASS.
              4. Do not move to next part until current part is PASS.

              ${escalation ? "Escalation rule: blocked/stale beyond 120 minutes. Team intervention required now." : ""}
              `;

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr.number,
                body
              });
              core.info(`Posted watchdog comment on PR #${pr.number}.`);
            }
